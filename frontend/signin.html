<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | GetJob</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/signin.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="page-container">
      <div class="left-section">
        <div class="brand">
          <a href="index.html" class="logo">GetJob<span>.</span></a>
        </div>
        <div class="hero-content">
          <h1>Welcome Back!</h1>
          <p>Sign in to access personalized job recommendations and apply to opportunities.</p>
          <div class="features">
            <div class="feature-item">
              <i class="fa-solid fa-briefcase"></i>
              <span>20,000+ Job Opportunities</span>
            </div>
            <div class="feature-item">
              <i class="fa-solid fa-building"></i>
              <span>500+ Top Companies</span>
            </div>
            <div class="feature-item">
              <i class="fa-solid fa-chart-line"></i>
              <span>Career Growth Tools</span>
            </div>
          </div>
        </div>
      </div>

      <div class="right-section">
        <div class="signin-container">
          <div class="signin-header">
            <h2>Sign In</h2>
            <p>Enter your credentials to continue</p>
          </div>

          <form class="signin-form">
            <div class="form-group">
              <label for="email">Email</label>
              <div class="input-group">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" id="email" placeholder="Enter your email" required />
              </div>
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Enter your password" required />
                <button type="button" class="toggle-password">
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
            </div>

            <div class="form-options">
              <label class="remember-me">
                <input type="checkbox" />
                <span>Remember me</span>
              </label>
              <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="signin-btn">Sign In</button>

            <div class="divider">
              <span>or continue with</span>
            </div>

            <div class="social-signin">
              <button type="button" class="social-btn google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" />
                Sign in with Google
              </button>
              <button type="button" class="social-btn github">
                <i class="fa-brands fa-github"></i>
                Sign in with GitHub
              </button>
            </div>

            <p class="signup-prompt">
              Don't have an account? <a href="signup.html">Sign up</a>
            </p>
          </form>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/signin.js"></script>
  </body>
</html>
