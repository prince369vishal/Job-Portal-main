<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Education Details | GetJob</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/education.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="page-container">
      <nav class="profile-nav">
        <a href="index.html" class="logo">GetJob<span>.</span></a>
        <div class="nav-progress">
          <div class="progress-steps">
            <div class="step completed">
              <i class="fa-solid fa-check"></i>
              <span>Basic Info</span>
            </div>
            <div class="step active">
              <i class="fa-solid fa-graduation-cap"></i>
              <span>Education</span>
            </div>
            <div class="step">
              <i class="fa-solid fa-briefcase"></i>
              <span>Experience</span>
            </div>
            <div class="step">
              <i class="fa-solid fa-code"></i>
              <span>Skills</span>
            </div>
          </div>
        </div>
      </nav>

      <main class="education-content">
        <div class="section-header">
          <h1>Education Background</h1>
          <p>Add your educational qualifications</p>
        </div>

        <div class="education-list">
          <!-- Education Entry -->
          <div class="education-entry">
            <div class="entry-header">
              <h3>Add Education</h3>
              <button type="button" class="btn-icon remove-entry" title="Remove">
                <i class="fa-solid fa-times"></i>
              </button>
            </div>

            <form class="education-form">
              <div class="form-grid">
                <div class="form-group full-width">
                  <label for="institution">Institution Name</label>
                  <div class="input-group">
                    <i class="fa-solid fa-building-columns"></i>
                    <input
                      type="text"
                      id="institution"
                      placeholder="Enter institution name"
                      required
                    />
                  </div>
                </div>

                <div class="form-group">
                  <label for="degree">Degree</label>
                  <div class="input-group">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <select id="degree" required>
                      <option value="">Select degree</option>
                      <option value="bachelor">Bachelor's Degree</option>
                      <option value="master">Master's Degree</option>
                      <option value="phd">Ph.D.</option>
                      <option value="diploma">Diploma</option>
                    </select>
                  </div>
                </div>

                <div class="form-group">
                  <label for="field">Field of Study</label>
                  <div class="input-group">
                    <i class="fa-solid fa-book"></i>
                    <input
                      type="text"
                      id="field"
                      placeholder="e.g. Computer Science"
                      required
                    />
                  </div>
                </div>

                <div class="form-group">
                  <label for="startDate">Start Date</label>
                  <div class="input-group">
                    <i class="fa-solid fa-calendar"></i>
                    <input type="month" id="startDate" required />
                  </div>
                </div>

                <div class="form-group">
                  <label for="endDate">End Date</label>
                  <div class="input-group">
                    <i class="fa-solid fa-calendar"></i>
                    <input type="month" id="endDate" />
                  </div>
                </div>

                <div class="form-group">
                  <label class="checkbox-label">
                    <input type="checkbox" id="currentlyStudying" />
                    <span>I am currently studying here</span>
                  </label>
                </div>

                <div class="form-group full-width">
                  <label for="achievements">Achievements & Activities</label>
                  <div class="input-group">
                    <textarea
                      id="achievements"
                      rows="3"
                      placeholder="Describe your major achievements, activities, etc."
                    ></textarea>
                  </div>
                </div>
              </div>
            </form>
          </div>
        </div>

        <button type="button" class="btn-add-more">
          <i class="fa-solid fa-plus"></i>
          Add Another Education
        </button>

        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="location.href='create-profile.html'">
            <i class="fa-solid fa-arrow-left"></i>
            Back to Basic Info
          </button>
          <button type="button" class="btn-primary" onclick="saveAndContinue()">
            Continue to Experience
            <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/education.js"></script>
  </body>
</html>
