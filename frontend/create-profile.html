<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Profile | GetJob</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/create-profile.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="page-container">
      <nav class="profile-nav">
        <a href="index.html" class="logo">GetJob<span>.</span></a>
        <div class="nav-progress">
          <div class="progress-steps">
            <div class="step active">
              <i class="fa-solid fa-user"></i>
              <span>Basic Info</span>
            </div>
            <div class="step">
              <i class="fa-solid fa-graduation-cap"></i>
              <span>Education</span>
            </div>
            <div class="step">
              <i class="fa-solid fa-briefcase"></i>
              <span>Experience</span>
            </div>
            <div class="step">
              <i class="fa-solid fa-code"></i>
              <span>Skills</span>
            </div>
          </div>
        </div>
      </nav>

      <main class="profile-content">
        <!-- Basic Info Section -->
        <section class="profile-section active" id="basic-info">
          <div class="section-header">
            <h1>Create Your Professional Profile</h1>
            <p>Let's start with your basic information</p>
          </div>

          <form class="profile-form">
            <div class="profile-photo">
              <div class="photo-upload">
                <img
                  src="https://via.placeholder.com/150"
                  alt="Profile Photo"
                  id="profile-preview"
                />
                <div class="upload-overlay">
                  <i class="fa-solid fa-camera"></i>
                  <span>Upload Photo</span>
                </div>
              </div>
              <input type="file" id="photo-input" accept="image/*" hidden />
            </div>

            <div class="form-grid">
              <div class="form-group">
                <label for="firstName">First Name</label>
                <div class="input-group">
                  <i class="fa-solid fa-user"></i>
                  <input
                    type="text"
                    id="firstName"
                    placeholder="Enter first name"
                    required
                  />
                </div>
              </div>

              <div class="form-group">
                <label for="lastName">Last Name</label>
                <div class="input-group">
                  <i class="fa-solid fa-user"></i>
                  <input
                    type="text"
                    id="lastName"
                    placeholder="Enter last name"
                    required
                  />
                </div>
              </div>

              <div class="form-group full-width">
                <label for="headline">Professional Headline</label>
                <div class="input-group">
                  <i class="fa-solid fa-briefcase"></i>
                  <input
                    type="text"
                    id="headline"
                    placeholder="e.g. Full Stack Developer | AI Enthusiast"
                    required
                  />
                </div>
              </div>

              <div class="form-group full-width">
                <label for="bio">About Me</label>
                <div class="input-group">
                  <textarea
                    id="bio"
                    rows="4"
                    placeholder="Write a short bio about yourself"
                  ></textarea>
                </div>
              </div>

              <div class="form-group">
                <label for="email">Email</label>
                <div class="input-group">
                  <i class="fa-solid fa-envelope"></i>
                  <input
                    type="email"
                    id="email"
                    placeholder="Enter email"
                    required
                  />
                </div>
              </div>

              <div class="form-group">
                <label for="phone">Phone</label>
                <div class="input-group">
                  <i class="fa-solid fa-phone"></i>
                  <input
                    type="tel"
                    id="phone"
                    placeholder="Enter phone number"
                  />
                </div>
              </div>

              <div class="form-group">
                <label for="location">Location</label>
                <div class="input-group">
                  <i class="fa-solid fa-location-dot"></i>
                  <input
                    type="text"
                    id="location"
                    placeholder="City, Country"
                    required
                  />
                </div>
              </div>

              <div class="form-group">
                <label for="website">Portfolio Website</label>
                <div class="input-group">
                  <i class="fa-solid fa-globe"></i>
                  <input
                    type="url"
                    id="website"
                    placeholder="https://yourwebsite.com"
                  />
                </div>
              </div>
            </div>

            <div class="form-actions">
              <button type="button" class="btn-secondary">Save as Draft</button>
              <button type="button" class="btn-primary" onclick="nextSection()">
                Continue to Education
                <i class="fa-solid fa-arrow-right"></i>
              </button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/create-profile.js"></script>
  </body>
</html>
