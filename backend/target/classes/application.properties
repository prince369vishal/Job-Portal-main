# GetJob Application Configuration
spring.application.name=getjob-backend
server.port=8080

# Database - PostgreSQL (production)
spring.datasource.url=jdbc:postgresql://localhost:5432/getjob_db
spring.datasource.username=getjob_user
spring.datasource.password=getjob_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Use H2 for development if PostgreSQL not available
spring.profiles.active=dev
