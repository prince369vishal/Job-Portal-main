<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work Experience | GetJob</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="experience.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="page-container">
      <nav class="profile-nav">
        <a href="index.html" class="logo">GetJob<span>.</span></a>
        <div class="nav-progress">
          <div class="progress-steps">
            <div class="step completed">
              <i class="fa-solid fa-check"></i>
              <span>Basic Info</span>
            </div>
            <div class="step completed">
              <i class="fa-solid fa-check"></i>
              <span>Education</span>
            </div>
            <div class="step active">
              <i class="fa-solid fa-briefcase"></i>
              <span>Experience</span>
            </div>
            <div class="step">
              <i class="fa-solid fa-code"></i>
              <span>Skills</span>
            </div>
          </div>
        </div>
      </nav>

      <main class="experience-content">
        <div class="section-header">
          <h1>Work Experience</h1>
          <p>Add your professional experience</p>
        </div>

        <div class="experience-list">
          <div class="experience-entry">
            <div class="entry-header">
              <h3>Add Experience</h3>
              <button type="button" class="btn-icon remove-entry" title="Remove">
                <i class="fa-solid fa-times"></i>
              </button>
            </div>

            <form class="experience-form">
              <div class="form-grid">
                <div class="form-group full-width">
                  <label for="company">Company Name</label>
                  <div class="input-group">
                    <i class="fa-solid fa-building"></i>
                    <input type="text" id="company" placeholder="Enter company name" required />
                  </div>
                </div>

                <div class="form-group full-width">
                  <label for="position">Job Title</label>
                  <div class="input-group">
                    <i class="fa-solid fa-briefcase"></i>
                    <input type="text" id="position" placeholder="e.g. Software Engineer" required />
                  </div>
                </div>

                <div class="form-group">
                  <label for="employmentType">Employment Type</label>
                  <div class="input-group">
                    <i class="fa-solid fa-user-tie"></i>
                    <select id="employmentType" required>
                      <option value="">Select type</option>
                      <option value="fullTime">Full-time</option>
                      <option value="partTime">Part-time</option>
                      <option value="contract">Contract</option>
                      <option value="internship">Internship</option>
                      <option value="freelance">Freelance</option>
                    </select>
                  </div>
                </div>

                <div class="form-group">
                  <label for="location">Location</label>
                  <div class="input-group">
                    <i class="fa-solid fa-location-dot"></i>
                    <input type="text" id="location" placeholder="City, Country" required />
                  </div>
                </div>

                <div class="form-group">
                  <label for="startDate">Start Date</label>
                  <div class="input-group">
                    <i class="fa-solid fa-calendar"></i>
                    <input type="month" id="startDate" required />
                  </div>
                </div>

                <div class="form-group">
                  <label for="endDate">End Date</label>
                  <div class="input-group">
                    <i class="fa-solid fa-calendar"></i>
                    <input type="month" id="endDate" />
                  </div>
                </div>

                <div class="form-group">
                  <label class="checkbox-label">
                    <input type="checkbox" id="currentlyWorking" />
                    <span>I currently work here</span>
                  </label>
                </div>

                <div class="form-group full-width">
                  <label for="responsibilities">Key Responsibilities</label>
                  <div class="input-group">
                    <textarea
                      id="responsibilities"
                      rows="4"
                      placeholder="• List your key responsibilities and achievements&#10;• Use bullet points for better readability&#10;• Focus on impact and results&#10;• Include relevant metrics when possible"
                    ></textarea>
                  </div>
                </div>

                <div class="form-group full-width">
                  <label>Technologies Used</label>
                  <div class="tags-input">
                    <div class="tags-list"></div>
                    <input
                      type="text"
                      id="techInput"
                      placeholder="Type and press Enter to add technologies"
                    />
                  </div>
                </div>
              </div>
            </form>
          </div>
        </div>

        <button type="button" class="btn-add-more">
          <i class="fa-solid fa-plus"></i>
          Add Another Experience
        </button>

        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="location.href='education.html'">
            <i class="fa-solid fa-arrow-left"></i>
            Back to Education
          </button>
          <button type="button" class="btn-primary" onclick="saveAndContinue()">
            Continue to Skills
            <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </main>
    </div>

    <script src="experience.js"></script>
  </body>
</html>
